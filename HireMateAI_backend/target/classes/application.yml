spring:
  application:
    name: hiremate-ai

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:hiremate}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# JWT配置
jwt:
  secret: ${JWT_SECRET:hiremate-ai-secret-key-2026-very-long-and-secure-key-for-jwt-signing}
  expiration: ${JWT_EXPIRATION:86400000}

# DashScope AI配置
dashscope:
  api-key: ${DASHSCOPE_API_KEY:请替换为你的DashScope密钥}
  model: ${DASHSCOPE_MODEL:qwen-plus}
  base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/api/v1}

# Knife4j OpenAPI配置
knife4j:
  enable: true
  setting:
    language: zh_cn
  openapi:
    title: HireMate AI 接口文档
    description: AI驱动的智能面试系统
    version: 1.0.0
    contact:
      name: HireMate Team
      email: support@hiremate.ai

# Actuator 健康检查端点
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# 日志配置
logging:
  level:
    com.hiremate: ${LOG_LEVEL:INFO}
    org.springframework.security: ${LOG_LEVEL:INFO}
